name: Frontend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'looqa_front/package-lock.json'
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./looqa_front
    
    - name: Run linter
      run: npm run lint
      working-directory: ./looqa_front
    
    - name: Build project
      run: npm run build
      working-directory: ./looqa_front
